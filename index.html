<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsPRO - Modern Admin & Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .sidebar-active { background: #2563eb; color: white !important; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .hidden-node { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="section-login" class="min-h-screen flex items-center justify-center bg-slate-950 p-6">
    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm fade-in">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl text-white text-3xl mb-4 shadow-xl">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800">Admin Login</h2>
            <p class="text-slate-500 text-sm">Masukkan akses kredensial Anda</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="user-in" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="admin">
            <input type="password" id="pass-in" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="berita123">
            <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all active:scale-95">Masuk ke Sistem</button>
            <p id="login-err" class="hidden-node text-red-500 text-center text-xs font-bold py-2 bg-red-50 rounded-lg">⚠️ Username atau Password Salah!</p>
        </div>
    </div>
</div>

<div id="section-dashboard" class="hidden-node min-h-screen flex">
    <aside class="w-64 bg-slate-900 text-slate-400 p-6 fixed h-full flex flex-col z-50">
        <div class="flex items-center gap-3 text-white mb-10 px-2">
            <i class="fas fa-newspaper text-blue-500 text-2xl"></i>
            <span class="text-xl font-bold tracking-tighter">NEWS<span class="text-blue-500">PRO</span></span>
        </div>
        <nav class="space-y-2 flex-1">
            <button onclick="showPage('stat')" id="nav-stat" class="sidebar-active w-full flex items-center gap-4 px-4 py-3 rounded-xl transition">
                <i class="fas fa-chart-line"></i> Statistik
            </button>
            <button onclick="showPage('manage')" id="nav-manage" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl transition hover:text-white hover:bg-slate-800">
                <i class="fas fa-edit"></i> Manajemen Post
            </button>
            <button onclick="showPage('comments')" id="nav-comments" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl transition hover:text-white hover:bg-slate-800">
                <i class="fas fa-comments"></i> Komentar
            </button>
        </nav>
        <button onclick="location.reload()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 font-bold transition">
            <i class="fas fa-power-off"></i> Logout
        </button>
    </aside>

    <main class="flex-1 ml-64 p-8 lg:p-12">
        <div id="page-stat" class="fade-in">
            <h2 class="text-3xl font-black text-slate-800 mb-8">Ringkasan Portal</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
                <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
                    <p class="text-slate-400 text-xs font-bold uppercase mb-2">Total Post</p>
                    <span id="stat-count-news" class="text-5xl font-black text-slate-800">0</span>
                </div>
                <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
                    <p class="text-slate-400 text-xs font-bold uppercase mb-2">Total Komentar</p>
                    <span id="stat-count-comm" class="text-5xl font-black text-blue-600">0</span>
                </div>
            </div>
        </div>

        <div id="page-manage" class="hidden-node fade-in">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black text-slate-800">Daftar Berita</h2>
                <button onclick="openModal()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-blue-500/20 hover:bg-blue-700 transition">
                    <i class="fas fa-plus mr-2"></i> Buat Berita Baru
                </button>
            </div>
            <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-100 text-slate-400 text-xs font-bold uppercase">
                        <tr>
                            <th class="p-5">Informasi Berita</th>
                            <th class="p-5 text-center">Tipe</th>
                            <th class="p-5">Link Share</th>
                            <th class="p-5 text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>

        <div id="page-comments" class="hidden-node fade-in">
            <h2 class="text-3xl font-black text-slate-800 mb-8">Komentar Terbaru</h2>
            <div id="comm-list-admin" class="grid grid-cols-1 gap-4"></div>
        </div>
    </main>
</div>

<div id="section-reader" class="hidden-node min-h-screen bg-white">
    <nav class="p-5 border-b sticky top-0 bg-white/90 backdrop-blur-md z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="font-black text-2xl tracking-tighter">NEWS<span class="text-blue-600">PRO</span></div>
            <a href="?" class="bg-slate-100 px-4 py-2 rounded-xl text-sm font-bold hover:bg-slate-200 transition">Tutup Berita</a>
        </div>
    </nav>
    <main class="max-w-3xl mx-auto p-6 py-12">
        <div id="reader-content" class="fade-in"></div>
        
        <div class="mt-20 pt-10 border-t border-slate-100">
            <h3 class="text-2xl font-bold mb-8">Diskusi Publik</h3>
            <div id="reader-comments" class="space-y-6 mb-12"></div>
            
            <div class="bg-slate-50 p-8 rounded-3xl shadow-inner">
                <h4 class="font-bold mb-4">Kirim Pendapat Anda</h4>
                <div class="grid grid-cols-1 gap-4">
                    <input type="text" id="c-user" placeholder="Nama Lengkap" class="p-4 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 shadow-sm font-semibold">
                    <textarea id="c-text" placeholder="Tulis komentar..." class="p-4 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 shadow-sm h-32"></textarea>
                    <button onclick="submitComment()" class="bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-xl shadow-blue-500/20 hover:bg-blue-700 transition">Publikasikan Komentar</button>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="modal-post" class="hidden-node fixed inset-0 bg-slate-950/70 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-2xl rounded-3xl p-8 shadow-2xl max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-2xl font-black text-slate-800">Buat Postingan</h3>
            <div class="flex bg-slate-100 p-1 rounded-xl">
                <button id="tab-manual" onclick="setPostType('manual')" class="px-4 py-2 rounded-lg font-bold text-xs transition bg-white text-blue-600 shadow-sm">MANUAL + GAMBAR</button>
                <button id="tab-link" onclick="setPostType('link')" class="px-4 py-2 rounded-lg font-bold text-xs transition text-slate-400">HANYA LINK</button>
            </div>
        </div>
        
        <div class="space-y-4">
            <input type="text" id="p-title" placeholder="Masukkan Judul Berita" class="w-full border p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold text-lg">
            
            <div id="box-manual" class="space-y-4">
                <div class="border-2 border-dashed border-slate-200 p-6 rounded-2xl text-center">
                    <input type="file" id="p-img" accept="image/*" class="hidden">
                    <label for="p-img" class="cursor-pointer">
                        <i class="fas fa-image text-3xl text-slate-300 mb-2"></i>
                        <p id="img-name" class="text-xs font-bold text-slate-400 uppercase">Klik untuk Upload Gambar Utama</p>
                    </label>
                </div>
                <textarea id="p-content" placeholder="Tulis isi berita lengkap di sini..." class="w-full border p-4 rounded-2xl h-48 outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            </div>

            <div id="box-link" class="hidden-node">
                <input type="url" id="p-url" placeholder="https://link-berita-eksternal.com" class="w-full border p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="flex justify-end gap-3 pt-6">
                <button onclick="closeModal()" class="px-6 font-bold text-slate-400">Batal</button>
                <button onclick="savePost()" class="bg-blue-600 text-white px-10 py-3 rounded-2xl font-bold shadow-lg shadow-blue-500/20 hover:bg-blue-700 transition">Publish Berita</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Database Logic
    let db_news = JSON.parse(localStorage.getItem('np_news_v2')) || [];
    let db_comm = JSON.parse(localStorage.getItem('np_comm_v2')) || [];
    let activeType = 'manual';
    let activeId = null;
    let base64Image = "";

    // --- Image Handling ---
    document.getElementById('p-img').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            document.getElementById('img-name').innerText = file.name;
            const reader = new FileReader();
            reader.onload = (event) => { base64Image = event.target.result; };
            reader.readAsDataURL(file);
        }
    });

    // --- Authentication ---
    function handleLogin() {
        const u = document.getElementById('user-in').value;
        const p = document.getElementById('pass-in').value;
        if(u === 'admin' && p === 'berita123') {
            document.getElementById('section-login').remove(); // Hapus total halaman login
            document.getElementById('section-dashboard').classList.remove('hidden-node');
            renderDashboard();
        } else {
            const err = document.getElementById('login-err');
            err.classList.remove('hidden-node');
            setTimeout(() => err.classList.add('hidden-node'), 2000);
        }
    }

    // --- Dashboard Logic ---
    function showPage(page) {
        ['stat', 'manage', 'comments'].forEach(p => {
            document.getElementById('page-'+p).classList.add('hidden-node');
            document.getElementById('nav-'+p).classList.remove('sidebar-active');
        });
        document.getElementById('page-'+page).classList.remove('hidden-node');
        document.getElementById('nav-'+page).classList.add('sidebar-active');
    }

    function openModal() { document.getElementById('modal-post').classList.remove('hidden-node'); }
    function closeModal() { document.getElementById('modal-post').classList.add('hidden-node'); }

    function setPostType(t) {
        activeType = t;
        document.getElementById('box-manual').classList.toggle('hidden-node', t === 'link');
        document.getElementById('box-link').classList.toggle('hidden-node', t === 'manual');
        document.getElementById('tab-manual').className = t === 'manual' ? 'px-4 py-2 rounded-lg font-bold text-xs transition bg-white text-blue-600 shadow-sm' : 'px-4 py-2 rounded-lg font-bold text-xs transition text-slate-400';
        document.getElementById('tab-link').className = t === 'link' ? 'px-4 py-2 rounded-lg font-bold text-xs transition bg-white text-blue-600 shadow-sm' : 'px-4 py-2 rounded-lg font-bold text-xs transition text-slate-400';
    }

    function savePost() {
        const title = document.getElementById('p-title').value;
        const now = new Date();
        const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
        const months = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
        
        const timestamp = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;

        let postData = {
            id: Date.now(),
            title: title,
            type: activeType,
            date: timestamp,
            views: 0
        };

        if(activeType === 'manual') {
            postData.content = document.getElementById('p-content').value;
            postData.image = base64Image;
        } else {
            postData.url = document.getElementById('p-url').value;
        }

        if(!title) return alert("Judul tidak boleh kosong!");

        db_news.push(postData);
        localStorage.setItem('np_news_v2', JSON.stringify(db_news));
        location.reload();
    }

    function renderDashboard() {
        document.getElementById('stat-count-news').innerText = db_news.length;
        document.getElementById('stat-count-comm').innerText = db_comm.length;

        const tbody = document.getElementById('table-body');
        tbody.innerHTML = db_news.map(n => `
            <tr class="hover:bg-slate-50 transition border-b border-slate-50">
                <td class="p-5">
                    <div class="font-bold text-slate-800">${n.title}</div>
                    <div class="text-[10px] text-slate-400 font-bold uppercase">${n.date}</div>
                </td>
                <td class="p-5 text-center">
                    <span class="px-3 py-1 rounded-full text-[10px] font-black ${n.type === 'manual' ? 'bg-purple-100 text-purple-600' : 'bg-blue-100 text-blue-600'} uppercase">
                        ${n.type}
                    </span>
                </td>
                <td class="p-5">
                    <button onclick="copyShare(${n.id})" class="text-[10px] font-bold bg-slate-100 px-3 py-1 rounded hover:bg-blue-600 hover:text-white transition">
                        SHARE LINK
                    </button>
                </td>
                <td class="p-5 text-right">
                    <button onclick="deletePost(${n.id})" class="text-red-400 hover:text-red-600 transition"><i class="fas fa-trash-alt"></i></button>
                </td>
            </tr>
        `).reverse().join('') || '<tr><td colspan="4" class="p-10 text-center text-slate-400 italic">Belum ada berita diposting.</td></tr>';

        const cList = document.getElementById('comm-list-admin');
        cList.innerHTML = db_comm.map(c => `
            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex justify-between items-start">
                <div>
                    <div class="text-blue-600 font-bold text-sm">@${c.user} <span class="text-slate-300 ml-2 font-normal text-xs">pada ID: ${c.newsId}</span></div>
                    <p class="text-slate-600 text-sm mt-1">"${c.text}"</p>
                </div>
                <button onclick="deleteComm(${c.id})" class="text-slate-300 hover:text-red-500"><i class="fas fa-times"></i></button>
            </div>
        `).reverse().join('') || '<p class="text-slate-400 italic text-center p-10">Tidak ada komentar masuk.</p>';
    }

    function deletePost(id) {
        if(confirm("Hapus berita ini selamanya?")) {
            db_news = db_news.filter(x => x.id !== id);
            localStorage.setItem('np_news_v2', JSON.stringify(db_news));
            renderDashboard();
        }
    }

    function copyShare(id) {
        const link = window.location.href.split('?')[0] + "?id=" + id;
        navigator.clipboard.writeText(link);
        alert("Link share berhasil disalin ke clipboard!");
    }

    // --- Portal Reader Logic ---
    function initRouter() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if(id) {
            activeId = id;
            const post = db_news.find(x => x.id == id);
            if(post) {
                document.getElementById('section-login').remove();
                document.getElementById('section-reader').classList.remove('hidden-node');
                renderReader(post);
            }
        }
    }

    function renderReader(post) {
        const area = document.getElementById('reader-content');
        if(post.type === 'link') {
            area.innerHTML = `
                <div class="text-center py-20">
                    <div class="text-blue-600 font-black text-xs uppercase tracking-widest mb-4">${post.date}</div>
                    <h1 class="text-4xl lg:text-5xl font-black mb-8 leading-tight">${post.title}</h1>
                    <p class="text-slate-500 mb-12 text-lg">Berita ini dipublikasikan melalui tautan eksternal. Silakan klik tombol di bawah untuk membaca artikel selengkapnya.</p>
                    <a href="${post.url}" target="_blank" class="inline-block bg-blue-600 text-white px-12 py-5 rounded-2xl font-black shadow-2xl shadow-blue-500/40 hover:scale-105 transition active:scale-95">BACA SELENGKAPNYA</a>
                </div>
            `;
        } else {
            area.innerHTML = `
                <div class="text-blue-600 font-black text-xs uppercase tracking-widest mb-4">${post.date}</div>
                <h1 class="text-4xl lg:text-6xl font-black mb-10 leading-tight">${post.title}</h1>
                ${post.image ? `<img src="${post.image}" class="w-full h-[400px] object-cover rounded-3xl mb-12 shadow-xl">` : ''}
                <div class="text-slate-700 text-xl leading-relaxed whitespace-pre-wrap">${post.content}</div>
            `;
        }
        renderCommentsReader();
    }

    function renderCommentsReader() {
        const list = document.getElementById('reader-comments');
        const comments = db_comm.filter(c => c.newsId == activeId);
        list.innerHTML = comments.map(c => `
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold text-xs uppercase">${c.user[0]}</div>
                    <span class="font-bold text-slate-800">${c.user}</span>
                </div>
                <p class="text-slate-600 ml-11">${c.text}</p>
            </div>
        `).join('') || '<p class="text-slate-400 italic text-center py-4">Jadilah yang pertama memberikan pendapat!</p>';
    }

    function submitComment() {
        const u = document.getElementById('c-user').value.trim();
        const t = document.getElementById('c-text').value.trim();
        if(!u || !t) return alert("Nama dan komentar wajib diisi!");

        db_comm.push({ id: Date.now(), newsId: activeId, user: u, text: t });
        localStorage.setItem('np_comm_v2', JSON.stringify(db_comm));
        document.getElementById('c-text').value = "";
        renderCommentsReader();
    }

    window.onload = initRouter;
</script>
</body>
</html>
